<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago completado | Mountain Soldiers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="simple-page">
    <section class="card">
      <div class="status-icon success">✓</div>
      <p class="section-kicker">Mountain Soldiers</p>
      <h1>Pago completado</h1>
      <div class="result-box success">
        <h2 class="result-title">Tu reserva ha quedado encaminada correctamente</h2>
        <p>Hemos recibido tu pago y el sistema seguirá el flujo de confirmación previsto.</p>
        <p>En breve deberías recibir la comunicación correspondiente por el canal configurado.</p>
      </div>

      <div class="result-actions" style="margin-top: 20px;">
        <a href="index.html" class="link-button">Volver a la web de reservas</a>
      </div>
    </section>
  </main>
</body>
</html>
